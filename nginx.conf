server {
    listen 80;
    server_name localhost;

    # Sirve los archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Proxy transparente: todas las peticiones a /api/* las redirige al backend
    # Así el navegador siempre habla con el mismo origen (puerto 80) y no hay CORS
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts generosos por si el backend tarda en arrancar
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Todo lo demás es HTML/CSS/JS estático
    location / {
        try_files $uri $uri/ /index.html;
    }
}
